# Railway Monorepo Configuration
# Deploy backend and frontend as separate services in Railway

# For the backend service, set Root Directory to: backend
# For the frontend service, set Root Directory to: frontend

# This file tells Railway to use Python for the root (backend fallback)
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
